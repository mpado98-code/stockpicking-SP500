name: Stock Picker S&P500

on:
  schedule:
    # Ogni giorno feriale alle 07:00 UTC = 08:00 ITA inverno / 09:00 ITA estate
    - cron: '0 7 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write   # necessario per committare positions.json quando si apre un trade

jobs:
  run-picker:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r stockpicker_requirements.txt

      - name: Run stock picker
        env:
          TELEGRAM_BOT_TOKEN_PICKER: ${{ secrets.TELEGRAM_BOT_TOKEN_PICKER }}
          TELEGRAM_CHAT_ID_PICKER: ${{ secrets.TELEGRAM_CHAT_ID_PICKER }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python stockpicker.py

      - name: Commit positions.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ ! -f positions.json ]; then
            echo "Nessun positions.json: nessun segnale aperto oggi"
            exit 0
          fi
          git add positions.json
          if git diff --cached --quiet; then
            echo "Nessuna modifica a positions.json"
          else
            git commit -m "chore: nuova posizione aperta [automated]"
            git push
          fi
